name: Auto-Release & Publish NuGet

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/DynamoDBv2.Transactions.csproj'

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{github.workspace}}/nupkgs

# Versioning scheme:
#   <Version> = {aws_major}.{aws_minor}.{aws_patch}.{aws_rev * 100 + lib_rev}
#   Example: AWS SDK 4.0.14.1, lib revision 0 → 4.0.14.100
#   Example: AWS SDK 4.0.14.1, lib revision 3 → 4.0.14.103
#   Example: AWS SDK 4.0.15.0, lib revision 0 → 4.0.15.0
#   When AWS SDK bumps, reset lib_rev to 0 and recompute the 4th segment.

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version-check.outputs.changed }}
      current_version: ${{ steps.version-check.outputs.current_version }}
      previous_version: ${{ steps.version-check.outputs.previous_version }}
      aws_sdk_version: ${{ steps.version-check.outputs.aws_sdk_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version change
        id: version-check
        run: |
          # Read current state
          CURRENT_LIB_VERSION=$(grep -oP '(?<=<Version>)[^<]*' src/DynamoDBv2.Transactions.csproj)
          AWS_SDK_VERSION=$(grep -oP '(?<=<PackageReference Include="AWSSDK.DynamoDBv2" Version=")[^"]*' src/DynamoDBv2.Transactions.csproj)
          echo "aws_sdk_version=$AWS_SDK_VERSION" >> "$GITHUB_OUTPUT"

          # Read previous state
          PREVIOUS_LIB_VERSION=$(git show HEAD~1:src/DynamoDBv2.Transactions.csproj 2>/dev/null | grep -oP '(?<=<Version>)[^<]*' || echo "")
          PREVIOUS_AWS_SDK=$(git show HEAD~1:src/DynamoDBv2.Transactions.csproj 2>/dev/null | grep -oP '(?<=<PackageReference Include="AWSSDK.DynamoDBv2" Version=")[^"]*' || echo "")

          echo "Previous lib version: $PREVIOUS_LIB_VERSION, Current: $CURRENT_LIB_VERSION"
          echo "Previous AWS SDK: $PREVIOUS_AWS_SDK, Current: $AWS_SDK_VERSION"

          # Check if AWS SDK version changed (e.g. Dependabot bump)
          if [ "$AWS_SDK_VERSION" != "$PREVIOUS_AWS_SDK" ] && [ -n "$PREVIOUS_AWS_SDK" ]; then
            echo "AWS SDK version changed: $PREVIOUS_AWS_SDK -> $AWS_SDK_VERSION"

            # Compute new library version: {major}.{minor}.{patch}.{rev * 100}
            IFS='.' read -r AWS_MAJOR AWS_MINOR AWS_PATCH AWS_REV <<< "$AWS_SDK_VERSION"
            AWS_REV=${AWS_REV:-0}
            NEW_FOURTH=$((AWS_REV * 100))
            NEW_VERSION="${AWS_MAJOR}.${AWS_MINOR}.${AWS_PATCH}.${NEW_FOURTH}"

            echo "Auto-computed new library version: $NEW_VERSION"

            # Update <Version> in csproj
            sed -i "s|<Version>$CURRENT_LIB_VERSION</Version>|<Version>$NEW_VERSION</Version>|" src/DynamoDBv2.Transactions.csproj

            # Commit the version bump
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/DynamoDBv2.Transactions.csproj
            git commit -m "chore: auto-bump version to $NEW_VERSION (AWS SDK $AWS_SDK_VERSION)"
            git push

            echo "current_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_version=$CURRENT_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"

          elif [ "$CURRENT_LIB_VERSION" != "$PREVIOUS_LIB_VERSION" ] && [ -n "$PREVIOUS_LIB_VERSION" ]; then
            # Library version was manually bumped
            echo "Library version changed: $PREVIOUS_LIB_VERSION -> $CURRENT_LIB_VERSION"
            echo "current_version=$CURRENT_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_version=$PREVIOUS_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: forcing publish of $CURRENT_LIB_VERSION"
            echo "current_version=$CURRENT_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_version=$PREVIOUS_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"

          else
            echo "No version change detected (current: $CURRENT_LIB_VERSION)"
            echo "current_version=$CURRENT_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_version=$PREVIOUS_LIB_VERSION" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Create GitHub Release
        run: |
          VERSION="${{ needs.detect-version.outputs.current_version }}"
          PREV="${{ needs.detect-version.outputs.previous_version }}"
          AWS_SDK="${{ needs.detect-version.outputs.aws_sdk_version }}"
          TAG="v$VERSION"

          # Check if tag already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --title "v$VERSION" \
            --notes "## Changes

          - Library version: $VERSION (previous: $PREV)
          - AWSSDK.DynamoDBv2: $AWS_SDK

          Published automatically to [NuGet](https://www.nuget.org/packages/DynamoDBv2.Transactions/$VERSION)." \
            --target master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-publish:
    needs: [detect-version, create-release]
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build and Pack
        run: |
          VERSION="${{ needs.detect-version.outputs.current_version }}"
          echo "Building and packing version: $VERSION"

          dotnet build src/DynamoDBv2.Transactions.csproj --configuration Release
          dotnet pack src/DynamoDBv2.Transactions.csproj --configuration Release \
            --output ${{ env.NuGetDirectory }} \
            /p:Version=$VERSION

      - name: Validate NuGet package
        run: |
          dotnet tool update Meziantou.Framework.NuGetPackageValidation.Tool --global
          meziantou.validate-nuget-package $(ls "${{ env.NuGetDirectory }}"/*.nupkg) --excluded-rules Symbols

      - name: Publish to NuGet.org
        run: |
          # Push .nupkg first, then .snupkg (symbols require the package to exist)
          for file in $(find ${{ env.NuGetDirectory }} -name "*.nupkg" ! -name "*.snupkg"); do
            dotnet nuget push "$file" \
              --api-key "${{ secrets.NUGET_PUSH_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
          for file in $(find ${{ env.NuGetDirectory }} -name "*.snupkg"); do
            dotnet nuget push "$file" \
              --api-key "${{ secrets.NUGET_PUSH_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          for file in $(find ${{ env.NuGetDirectory }} -name "*.nupkg" ! -name "*.snupkg"); do
            dotnet nuget push "$file" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/" \
              --skip-duplicate
          done
          for file in $(find ${{ env.NuGetDirectory }} -name "*.snupkg"); do
            dotnet nuget push "$file" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/" \
              --skip-duplicate
          done
