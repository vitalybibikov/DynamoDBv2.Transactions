services:
  tests:
    image: ${DOCKER_REGISTRY-}tests
    build:
      context: .
      dockerfile: ./test/DynamoDBv2.Transactions.IntegrationTests/Dockerfile
    depends_on:
      - localstack
  unittests:
    image: ${DOCKER_REGISTRY-}unittests
    build:
      context: .
      dockerfile: ./test/DynamoDBv2.Transactions.UnitTests/Dockerfile
  localstack:
    container_name: localstack
    # Pinned: localstack/localstack:latest now refuses to start without a Pro auth token.
    # 3.8.1 is the last community line that serves DynamoDB with no license.
    image: localstack/localstack:3.8.1